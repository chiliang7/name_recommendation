name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

# 部署方式:組好靜態站後直接 force push 到 gh-pages 分支,
# Pages 設定用「Deploy from a branch → gh-pages → /(root)」。
# (deploy-pages API 在此 repo 反覆回 "Deployment failed, try again later",
#  分支模式部署則已驗證可行,故採此路線。)
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 下載 Unihan(gitignore 的建庫原料)
        run: |
          curl -sL -o data/Unihan.zip https://www.unicode.org/Public/UCD/latest/ucd/Unihan.zip
          unzip -o -q data/Unihan.zip -d data/unihan

      - name: 建置字庫(含筆畫驗證,失敗即中止)
        run: python data/build_db.py

      - name: 組裝靜態站(index.html + Python 模組 + 資料 + 字庫)
        run: |
          mkdir -p _site/app _site/data _site/db
          cp static/index.html _site/index.html
          cp app/__init__.py app/wuge.py app/zodiac.py app/core.py _site/app/
          cp data/shuli_81.json data/zodiac_extra.json data/name_pool.json data/english_names.json _site/data/
          cp db/naming.sqlite3 _site/db/
          touch _site/.nojekyll

      - name: 推送到 gh-pages 分支
        run: |
          cd _site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy ${{ github.sha }}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
